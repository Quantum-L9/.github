schema_version: "1.0"
kernel_provider: "Quantum-L9/l9-ci-core"
current_ref: "v1"
current_sha: "2b330a5aab90cd7781bef08f14c5e7904b61bc56"
last_audited: "2026-07-05"

# TAG DISCIPLINE:
# v1.0.0 — immutable annotated tag, protected via GitHub tag protection rules
# v1      — moving tag, force-updated by platform team on backward-compatible changes
# v2      — cut for breaking changes (new required inputs, removed outputs, renamed jobs)
# Never reference @main from thin callers. Always use @v1.
#
# v1 is FROZEN (historical): l9-ci-core `main` has since been rewritten as a
# thin control plane (v2) and no longer contains these 8 kernels at HEAD —
# they only exist at the pinned historical commit above. @v1 starters below
# keep resolving against that frozen commit; they are not maintained further.

# v2 (CURRENT — start here for all new work):
#   Full instantiation pack:  l9-ci-pack/  (README.md + governance/ + workflows/)
#   Pinned Core ref:          see l9-ci-pack/README.md "Prerequisites" (full
#                              commit SHA pre-release; @v2.0.0 / @v2 after cut)
#   Legacy v1 starters:       workflow-templates/l9-{pr-pipeline,security,
#                              scorecard,sbom,pre-commit,nightly,release,
#                              governance,node-ts-monorepo}.yml — frozen @v1,
#                              kept only for already-imported wrappers.
v2:
  schema_version: "1.0"
  kernel_provider: "Quantum-L9/l9-ci-core"
  current_sha: "f88116503430aa18992b70d8d31063e34ff97ef1"
  status: "pre-release-candidate"  # flips to "released" once v2.0.0 is tagged
  pack_path: "l9-ci-pack/"
  pack_readme: "l9-ci-pack/README.md"
  reusable_workflows:
    - name: profile-normalize-semgrep
      file: "l9-ci-pack/workflows/l9-analysis.yml"
      calls: "Quantum-L9/l9-ci-core/.github/workflows/profile-normalize-semgrep.yml"
      classification: KERNEL
      description: "Semgrep -> SDK normalize/validate/route, one job per caller repo."
    - name: publish-analysis
      file: "l9-ci-pack/workflows/l9-analysis.yml"
      calls: "Quantum-L9/l9-ci-core/.github/workflows/publish-analysis.yml"
      classification: KERNEL
      description: "Publishes the resolved GitHub check + PR annotations from the SDK agent-review projection."
  consumer_owned_templates:
    - name: l9-lint-test
      file: "l9-ci-pack/workflows/l9-lint-test.yml"
      classification: CONSUMER_TEMPLATE
      description: "Python hygiene (ruff, mypy, pytest+coverage). Not called by Core; copied and owned by the consumer."
    - name: l9-lint-test-node
      file: "l9-ci-pack/workflows/l9-lint-test-node.yml"
      classification: CONSUMER_TEMPLATE
      description: "Node/TypeScript hygiene (eslint, tsc --noEmit, vitest run). Not called by Core; copied and owned by the consumer."
  governance_files:
    - "l9-ci-pack/governance/execution-profiles.yaml"
    - "l9-ci-pack/governance/provider-requiredness.yaml"
    - "l9-ci-pack/governance/rule-modes.yaml"
    - "l9-ci-pack/governance/waivers.yaml"
    - "l9-ci-pack/governance/promotion-policy.yaml"
    - "l9-ci-pack/governance/quality-thresholds.yaml"
  excluded_from_pack:
    # Owned solely by this repo's own community-health files; never synced
    # from l9-ci-core docs/templates/.
    - ".github/ISSUE_TEMPLATE/*"
    - "PULL_REQUEST_TEMPLATE.md"
  no_v2_equivalent:
    # SDK does not implement these providers yet — do not re-add as Core
    # reusable workflows without an explicit, authorized scope change.
    - scorecard
    - sbom
    - gitleaks
    - pre-commit
    - dedicated-nightly-release-kernel

kernels:
  - name: pr-pipeline
    file: ".github/workflows/pr-pipeline.yml"
    classification: KERNEL
    description: "Full PR validation pipeline: lint, type-check, tests, security gates"
    inputs:
      - name: python-version
        type: string
        required: false
        default: "3.12"
        description: "Python version for the pipeline"
      - name: run-security
        type: boolean
        required: false
        default: true
        description: "Whether to run security sub-steps"
      - name: working-directory
        type: string
        required: false
        default: "."
        description: "Working directory for all steps"
    outputs:
      - name: test-results
        description: "Path to pytest XML results"
    secrets:
      - name: inherit
        description: "All repo secrets inherited via secrets: inherit"

  - name: release-publish
    file: ".github/workflows/release-publish.yml"
    classification: KERNEL
    description: "Versioned release build, changelog generation, and PyPI/registry publish"
    inputs:
      - name: python-version
        type: string
        required: false
        default: "3.12"
      - name: publish-to-pypi
        type: boolean
        required: false
        default: true
      - name: tag-name
        type: string
        required: false
        default: "${{ github.ref_name }}"
    outputs:
      - name: release-url
        description: "GitHub Release URL"
    secrets:
      - name: inherit

  - name: nightly
    file: ".github/workflows/nightly.yml"
    classification: KERNEL
    description: "Scheduled nightly validation: extended test suite, dependency freshness check"
    inputs:
      - name: python-version
        type: string
        required: false
        default: "3.12"
      - name: run-extended-tests
        type: boolean
        required: false
        default: true
    outputs: []
    secrets:
      - name: inherit

  - name: pre-commit-ci
    file: ".github/workflows/pre-commit-ci.yml"
    classification: KERNEL
    description: "Runs pre-commit hooks in CI: ruff, mypy, trailing-whitespace, etc."
    inputs:
      - name: python-version
        type: string
        required: false
        default: "3.12"
    outputs: []
    secrets:
      - name: inherit

  - name: trio-governance
    file: ".github/workflows/trio-governance.yml"
    classification: KERNEL
    description: "Three-tier separation enforcement per CANONICAL_LAW.md §3: model/service/interface must not cross-import"
    inputs:
      - name: src-directory
        type: string
        required: false
        default: "src"
    outputs:
      - name: violations-found
        description: "true if trio separation violations detected"
    secrets:
      - name: inherit

  - name: security
    file: ".github/workflows/security.yml"
    classification: KERNEL
    description: "Security scan pipeline: gitleaks, Bandit, Semgrep, pip-audit/npm audit"
    inputs:
      - name: python-version
        type: string
        required: false
        default: "3.12"
      - name: run-npm-audit
        type: boolean
        required: false
        default: false
        description: "Set true for Node/TS repos"
    outputs:
      - name: sarif-path
        description: "Path to SARIF output uploaded to GitHub Security tab"
    secrets:
      - name: inherit

  - name: scorecard
    file: ".github/workflows/scorecard.yml"
    classification: KERNEL
    description: "OpenSSF Scorecard analysis, uploads results to GitHub Security tab"
    inputs:
      - name: scorecard-token
        type: string
        required: false
        description: "Override token for Scorecard API (uses GITHUB_TOKEN by default)"
    outputs:
      - name: scorecard-score
        description: "Numeric Scorecard result"
    secrets:
      - name: inherit

  - name: sbom
    file: ".github/workflows/sbom.yml"
    classification: KERNEL
    description: "SBOM generation via Syft/Anchore, SPDX-JSON format, uploaded to GitHub release"
    inputs:
      - name: image-ref
        type: string
        required: false
        description: "Container image ref for SBOM generation (leave blank for filesystem scan)"
    outputs:
      - name: sbom-path
        description: "Path to generated SPDX-JSON SBOM artifact"
    secrets:
      - name: inherit

  # INLINE ONLY — not a reusable kernel
  - name: l9-self-ci
    file: ".github/workflows/l9-self-ci.yml"
    classification: INLINE_ONLY
    description: "l9-ci-core self-validation CI. Must remain on: [pull_request, push]."
    rationale: |
      l9-self-ci.yml must NOT use workflow_call. Reason: l9-ci-core is the kernel provider.
      If kernels called themselves via workflow_call, this would create a circular dependency
      (a kernel calling itself to validate itself). Dogfood isolation requires the self-CI
      to run inline, not through the kernel dispatch system.
      This is intentional and must never be changed.
    inputs: []
    outputs: []
    secrets: []

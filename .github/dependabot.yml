# .github/dependabot.yml — Quantum-L9
# Automatically maintains SHA pins for starter workflows.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/workflow-templates"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "supply-chain"
    reviewers:
      - "Quantum-L9/platform"
    commit-message:
      prefix: "chore(deps)"

name: Bug Report
description: Report a defect in a Quantum-L9 repo
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Before submitting, check [RUNBOOK.md](https://github.com/Quantum-L9/l9-assurance/blob/main/RUNBOOK.md) for known issues."
  - type: input
    id: repo
    attributes:
      label: Affected Repository
      placeholder: "Quantum-L9/l9-assurance"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
    validations:
      required: true

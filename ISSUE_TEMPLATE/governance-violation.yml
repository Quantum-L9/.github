name: Governance Violation
description: Report a CANONICAL_LAW.md anti-pattern (§7) detected in the codebase
labels: ["governance", "priority"]
body:
  - type: markdown
    attributes:
      value: "Report violations of [CANONICAL_LAW.md §7 Anti-Patterns](https://github.com/Quantum-L9/Cursor-Governance/blob/main/CANONICAL_LAW.md#7-anti-patterns)."
  - type: input
    id: repo
    attributes:
      label: Repository
    validations:
      required: true
  - type: dropdown
    id: violation-type
    attributes:
      label: Anti-Pattern Type
      options:
        - "Second GlobalCommands tree in repo"
        - "Hard-reset or force-push of SSOT clone"
        - "Committed .cursor-commands symlink content"
    validations:
      required: true

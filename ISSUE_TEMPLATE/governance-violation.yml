name: Governance Violation
description: Report a CANONICAL_LAW.md anti-pattern (§7) detected in the codebase
labels: ["governance", "priority"]
body:
  - type: markdown
    attributes:
      value: |
        Report violations of CANONICAL_LAW.md §7 Anti-Patterns.
        CI should catch these automatically — if it did not, this report also documents the CI gap.
  - type: input
    id: repo
    attributes:
      label: Repository
    validations:
      required: true
  - type: dropdown
    id: violation-type
    attributes:
      label: Anti-Pattern Type (CANONICAL_LAW.md §7)
      options:
        - "Second GlobalCommands tree in repo (.cursor/governance/GlobalCommands, .cursor/skills, etc.)"
        - "Hard-reset or force-push of SSOT clone"
        - "Committed .cursor-commands symlink content (not the symlink itself)"
        - "Other §7 violation"
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: File Path(s) and Evidence
    validations:
      required: true
  - type: input
    id: ci-detection
    attributes:
      label: Was this caught by CI?
      placeholder: "Yes / No — if No, explain the gap"
